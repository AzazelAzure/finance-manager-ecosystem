# Blue/green edge — production hostnames (thehivemanager.com) with color maps.
# Mount as /etc/nginx/nginx.conf; include active_color.conf for $fm_active_color.
# Upstreams match docker-compose.bluegreen.yml service names on the project network.

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    port_in_redirect off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    include /etc/nginx/conf.d/active_color.conf;

    map $fm_active_color $api_backend {
        default api-blue:8000;
        blue    api-blue:8000;
        green   api-green:8000;
    }

    # Reflex HTTP + websockets: same target as single-stack (port 3000) per color
    map $fm_active_color $reflex_backend {
        default reflex-blue:3000;
        blue    reflex-blue:3000;
        green   reflex-green:3000;
    }

    server {
        listen 443 ssl;
        server_name thehivemanager.com www.thehivemanager.com;

        ssl_certificate     /etc/nginx/certs/financemanager.local.pem;
        ssl_certificate_key /etc/nginx/certs/financemanager.local-key.pem;

        location / {
            proxy_pass http://$reflex_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
            proxy_redirect http://localhost/ https://thehivemanager.com/;
            proxy_redirect http://thehivemanager.com/ https://thehivemanager.com/;
            proxy_redirect http://www.thehivemanager.com/ https://www.thehivemanager.com/;
        }
    }

    server {
        listen 443 ssl;
        server_name api.thehivemanager.com;

        ssl_certificate     /etc/nginx/certs/api.financemanager.local.pem;
        ssl_certificate_key /etc/nginx/certs/api.financemanager.local-key.pem;

        location / {
            proxy_pass http://$api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
        }
    }

    server {
        listen 443 ssl;
        server_name reflex-api.thehivemanager.com;

        ssl_certificate     /etc/nginx/certs/reflex-api.financemanager.local.pem;
        ssl_certificate_key /etc/nginx/certs/reflex-api.financemanager.local-key.pem;

        location / {
            proxy_pass http://$reflex_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
            proxy_redirect http://localhost/ https://reflex-api.thehivemanager.com/;
            proxy_redirect http://reflex-api.thehivemanager.com/ https://reflex-api.thehivemanager.com/;
        }
    }

    server {
        listen 80;
        server_name thehivemanager.com www.thehivemanager.com api.thehivemanager.com reflex-api.thehivemanager.com;
        return 301 https://$host$request_uri;
    }
}
