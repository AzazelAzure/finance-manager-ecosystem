# Blue/green edge — production hostnames (thehivemanager.com) with color maps.
# Mount as /etc/nginx/nginx.conf; include active_color.conf for $fm_active_color.
# Upstreams match docker-compose.bluegreen.yml service names on the project network.
#
# Apex (thehivemanager.com) serves the React (Vite) static bundle only — not Reflex.

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ""      $scheme;
    }

    sendfile        on;
    keepalive_timeout  65;
    port_in_redirect off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Populated at container start (Docker: 127.0.0.11, Podman: network gateway).
    include /etc/nginx/conf.d/00-resolver.conf;

    include /etc/nginx/conf.d/active_color.conf;

    map $fm_active_color $api_backend {
        default api-blue:8000;
        blue    api-blue:8000;
        green   api-green:8000;
    }

    # Staging API: always the *inactive* color (pairs with jsdevtesting web + SPA staging URL).
    map $fm_active_color $api_inactive_backend {
        default api-green:8000;
        blue    api-green:8000;
        green   api-blue:8000;
    }

    # Vite/React static (nginx in web-* containers) — same color as API for production hostnames
    map $fm_active_color $js_web_backend {
        default web-blue:80;
        blue    web-blue:80;
        green   web-green:80;
    }

    # Pre-cutover: jsdevtesting host serves the *inactive* color's web bundle so you validate
    # the next release without shifting public traffic. (Swap active → this flips automatically.)
    map $fm_active_color $js_devtesting_web_backend {
        default web-green:80;
        blue    web-green:80;
        green   web-blue:80;
    }

    server {
        listen 443 ssl;
        server_name thehivemanager.com www.thehivemanager.com;

        ssl_certificate     /etc/nginx/certs/financemanager.local.pem;
        ssl_certificate_key /etc/nginx/certs/financemanager.local-key.pem;

        location / {
            proxy_pass http://$js_web_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
        }
    }

    server {
        listen 443 ssl;
        server_name api.thehivemanager.com;

        ssl_certificate     /etc/nginx/certs/api.financemanager.local.pem;
        ssl_certificate_key /etc/nginx/certs/api.financemanager.local-key.pem;

        location / {
            proxy_pass http://$api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
        }
    }

    # Browsers on jsdevtesting call this host so API requests hit the *inactive* stack (same
    # build as production web; VITE_STAGING_API_BASE_URL + resolveApiBaseUrl() in the SPA).
    # Use the same (or a SAN/wildcard) cert as api.* — see deploy/BLUEGREEN_SWITCHOVER.md.
    server {
        listen 443 ssl;
        server_name api-jsdevtesting.thehivemanager.com;

        ssl_certificate     /etc/nginx/certs/api.financemanager.local.pem;
        ssl_certificate_key /etc/nginx/certs/api.financemanager.local-key.pem;

        location / {
            proxy_pass http://$api_inactive_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
        }
    }

    # Staging web host: *inactive* color (see $js_devtesting_web_backend).
    server {
        listen 443 ssl;
        server_name jsdevtesting.thehivemanager.com;

        ssl_certificate     /etc/nginx/certs/financemanager.local.pem;
        ssl_certificate_key /etc/nginx/certs/financemanager.local-key.pem;

        location / {
            proxy_pass http://$js_devtesting_web_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
        }
    }

    server {
        listen 80;
        server_name thehivemanager.com www.thehivemanager.com api.thehivemanager.com api-jsdevtesting.thehivemanager.com jsdevtesting.thehivemanager.com;
        return 301 https://$host$request_uri;
    }
}
