events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Shared SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Frontend
    server {
        listen 443 ssl;
        server_name financemanager.local;

        ssl_certificate     /etc/nginx/certs/financemanager.local.pem;
        ssl_certificate_key /etc/nginx/certs/financemanager.local-key.pem;

        location / {
            proxy_pass http://reflex:3000;
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Django API
    server {
        listen 443 ssl;
        server_name api.financemanager.local;

        ssl_certificate     /etc/nginx/certs/api.financemanager.local.pem;
        ssl_certificate_key /etc/nginx/certs/api.financemanager.local-key.pem;

        location / {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Reflex Backend / Websockets
    server {
        listen 443 ssl;
        server_name reflex-api.financemanager.local;

        ssl_certificate     /etc/nginx/certs/reflex-api.financemanager.local.pem;
        ssl_certificate_key /etc/nginx/certs/reflex-api.financemanager.local-key.pem;

        location / {
            proxy_pass http://reflex:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name financemanager.local api.financemanager.local reflex-api.financemanager.local;
        return 301 https://$host:8443$request_uri;
    }
}
