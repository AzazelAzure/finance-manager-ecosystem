events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ""      $scheme;
    }

    sendfile        on;
    keepalive_timeout  65;
    port_in_redirect off;

    # Shared SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Frontend: React (Vite) static only — not Reflex
    server {
        listen 443 ssl;
        server_name thehivemanager.com www.thehivemanager.com;

        ssl_certificate     /etc/nginx/certs/financemanager.local.pem;
        ssl_certificate_key /etc/nginx/certs/financemanager.local-key.pem;

        location / {
            proxy_pass http://web:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
        }
    }

    # Django API
    server {
        listen 443 ssl;
        server_name api.thehivemanager.com;

        ssl_certificate     /etc/nginx/certs/api.financemanager.local.pem;
        ssl_certificate_key /etc/nginx/certs/api.financemanager.local-key.pem;

        location / {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
        }
    }

    # Staging API hostname (single stack: same backend as api; blue/green uses inactive color).
    server {
        listen 443 ssl;
        server_name api-jsdevtesting.thehivemanager.com;

        ssl_certificate     /etc/nginx/certs/api.financemanager.local.pem;
        ssl_certificate_key /etc/nginx/certs/api.financemanager.local-key.pem;

        location / {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
        }
    }

    # Legacy Reflex hostname — UI retired
    server {
        listen 443 ssl;
        server_name reflex-api.thehivemanager.com;

        ssl_certificate     /etc/nginx/certs/reflex-api.financemanager.local.pem;
        ssl_certificate_key /etc/nginx/certs/reflex-api.financemanager.local-key.pem;

        location / {
            default_type text/plain;
            return 410 "Gone: Reflex UI is retired. Use https://thehivemanager.com/\n";
        }
    }

    # React (Vite) static — test hostnames
    server {
        listen 443 ssl;
        server_name jsdevtesting.thehivemanager.com jsdevprodtest.thehivemanager.com;

        ssl_certificate     /etc/nginx/certs/financemanager.local.pem;
        ssl_certificate_key /etc/nginx/certs/financemanager.local-key.pem;

        location / {
            proxy_pass http://web:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
        }
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name thehivemanager.com www.thehivemanager.com api.thehivemanager.com api-jsdevtesting.thehivemanager.com reflex-api.thehivemanager.com jsdevtesting.thehivemanager.com jsdevprodtest.thehivemanager.com;
        return 301 https://$host$request_uri;
    }
}
