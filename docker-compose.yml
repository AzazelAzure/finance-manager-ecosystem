services:
  db:
    image: docker.io/library/postgres:15-alpine
    container_name: finance-manager-db
    environment:
      POSTGRES_DB: ${DB_NAME:-finance_db}
      POSTGRES_USER: ${DB_USER:-finance_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-finance_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./finance_manager_api
      dockerfile: Dockerfile
    container_name: finance-manager-api
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=${DB_NAME:-finance_db}
      - DB_USER=${DB_USER:-finance_user}
      - DB_PASSWORD=${DB_PASSWORD:-finance_password}
      - DB_HOST=db
      - DB_PORT=5432
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-api.thehivemanager.com,thehivemanager.com,www.thehivemanager.com,api,localhost,127.0.0.1}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-https://thehivemanager.com,https://www.thehivemanager.com,https://api.thehivemanager.com,https://reflex-api.thehivemanager.com}
      - DEBUG=True
    depends_on:
      - db
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./finance_manager_web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.thehivemanager.com}
        VITE_STAGING_API_BASE_URL: ${VITE_STAGING_API_BASE_URL:-https://api-jsdevtesting.thehivemanager.com}
    container_name: finance-manager-web
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  proxy:
    build:
      context: ./proxy
    container_name: finance-manager-proxy
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./proxy/certs:/etc/nginx/certs:ro,z
    depends_on:
      - api
      - web
    stop_signal: SIGQUIT
    stop_grace_period: 30s

volumes:
  postgres_data:
