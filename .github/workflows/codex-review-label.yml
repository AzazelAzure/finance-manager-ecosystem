name: Codex Review Pending Label

# D1 (OPS-REVAMP-T01): GitHub-visible Stage 4→5 seal. Re-applies on synchronize so new
# commits after a prior verdict restore pending state until ws_review/codex_review clears it.

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  add-pending-label:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "codex-review:pending" \
            --repo "${{ github.repository }}" \
            --color "FBCA04" \
            --description "Codex review pending — do not merge manually while present" \
            2>/dev/null || true

      - name: Add codex-review:pending label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --add-label "codex-review:pending"
