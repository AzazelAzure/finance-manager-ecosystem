name: Health Check

# Self-hosted uptime monitor. Runs on GitHub's infrastructure (external from
# the VPS), so it detects VPS-down scenarios independently. On failure the run
# exits non-zero and GitHub emails the repo owner.

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes (GitHub may delay scheduled runs)
  workflow_dispatch:           # manual trigger for verification

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Check web app
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://thehivemanager.com:8443)
          echo "Web response: $code"
          [ "$code" = "200" ] || [ "$code" = "301" ] || [ "$code" = "302" ] || {
            echo "FAIL: unexpected response $code"
            exit 1
          }

      - name: Check API health endpoint
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://api.thehivemanager.com:8443/api/health/)
          echo "API response: $code"
          [ "$code" = "200" ] || {
            echo "FAIL: API health returned $code"
            exit 1
          }
