# Blue/green *application* services only, for parallel deploy beside the legacy
# `docker-compose.yml` stack (project `finance_manager`). Joins the same
# user-defined network so `api-*` / `web-*` use the running Postgres
# (default container name `finance-manager-db`) and do not publish host
# 5432/8080/8443.
#
# Use with: FM_BG_PARALLEL=1 (see scripts/ops/fm_server_beta.sh) or
#  podman-compose -p fm-beta -f docker-compose.bluegreen.parallel.yml
#
# Preconditions: finance_manager single-stack (or any stack) is up, Postgres
# reachable on FM_DB_CONTAINER_HOSTNAME. Switch/reload to blue/green edge is
# a separate step (this file intentionally omits the bg `proxy` service).

networks:
  shared:
    name: ${FM_STACK_NETWORK_NAME:-finance_manager_default}
    external: true

services:
  redis:
    image: docker.io/library/redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    expose:
      - "6379"
    volumes:
      - bg_parallel_redis_data:/data
    networks:
      - shared

  api-blue:
    build:
      context: ./finance_manager_api
      dockerfile: Dockerfile
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=${DB_NAME:-finance_db}
      - DB_USER=${DB_USER:-finance_user}
      - DB_PASSWORD=${DB_PASSWORD:-finance_password}
      - DB_HOST=${FM_DB_HOST:-finance-manager-db}
      - DB_PORT=5432
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${FM_API_ALLOWED_HOSTS:-api.financemanager.local,api-blue,api-green,api.thehivemanager.com,localhost,127.0.0.1}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-https://thehivemanager.com,https://www.thehivemanager.com,https://api.thehivemanager.com}
      - DEBUG=${DEBUG:-False}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_started
    networks:
      - shared
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 5s
      retries: 8
      start_period: 40s

  api-green:
    build:
      context: ./finance_manager_api
      dockerfile: Dockerfile
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=${DB_NAME:-finance_db}
      - DB_USER=${DB_USER:-finance_user}
      - DB_PASSWORD=${DB_PASSWORD:-finance_password}
      - DB_HOST=${FM_DB_HOST:-finance-manager-db}
      - DB_PORT=5432
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${FM_API_ALLOWED_HOSTS:-api.financemanager.local,api-blue,api-green,api.thehivemanager.com,localhost,127.0.0.1}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-https://thehivemanager.com,https://www.thehivemanager.com,https://api.thehivemanager.com}
      - DEBUG=${DEBUG:-False}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_started
    networks:
      - shared
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 5s
      retries: 8
      start_period: 40s

  web-blue:
    build:
      context: ./finance_manager_web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.thehivemanager.com}
        VITE_STAGING_API_BASE_URL: ${VITE_STAGING_API_BASE_URL:-https://api-jsdevtesting.thehivemanager.com}
    networks:
      - shared
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 8
      start_period: 15s

  web-green:
    build:
      context: ./finance_manager_web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.thehivemanager.com}
        VITE_STAGING_API_BASE_URL: ${VITE_STAGING_API_BASE_URL:-https://api-jsdevtesting.thehivemanager.com}
    networks:
      - shared
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 8
      start_period: 15s

volumes:
  bg_parallel_redis_data:
